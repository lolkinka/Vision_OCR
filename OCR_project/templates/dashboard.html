<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision — Панель управления</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
        }

        /* --- СТИЛИ НАВБАРА И ЛОГОТИПА --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid #eef1f5;
        }
        .logo-block {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
        .logo-icon {
            width: 28px;
            height: 28px;
            color: #007bff;
            transition: transform 0.3s ease;
        }
        .logo-block:hover .logo-icon {
            transform: rotate(90deg);
        }
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #007bff 0%, #00c6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            background-color: #e1f0ff;
            color: #007bff;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }
        .nav-menu {
            display: flex;
            align-items: center;
        }
        .nav-link {
            color: #495057;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .nav-link:hover {
            background-color: #f1f3f5;
            color: #007bff;
        }
        /* -------------------------------- */

        h2 { color: #333; margin-top: 0; }
        .drop-zone {
            border: 2px dashed #007bff;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: #f8fafd;
            transition: background 0.2s;
            color: #555;
        }
        .drop-zone:hover { background: #f0f4f8; }
        #fileInput { display: none; }
        .preview-img {
            max-width: 100%;
            max-height: 200px;
            margin-top: 15px;
            border-radius: 6px;
            display: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #cccccc; cursor: not-allowed; }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .action-buttons button {
            margin-top: 0;
            font-size: 14px;
            padding: 10px;
        }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }

        .btn-pdf { background: #dc3545; grid-column: span 2; }
        .btn-pdf:hover { background: #c82333; }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-left: 5px solid #28a745;
            border-radius: 4px;
            display: none;
        }
        .latex-code {
            font-family: monospace;
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ced4da;
            resize: vertical;
            margin-top: 5px;
        }

        .pdf-export-wrapper {
            background: white;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e3e6ea;
            margin: 15px 0;
        }
        #mathRender {
            font-size: 24px;
            text-align: center;
            min-height: 40px;
            overflow-x: auto;
            color: #000000;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="navbar">
        <div class="logo-block" onclick="window.location.href='/dashboard'">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.5"/>
                <circle cx="12" cy="12" r="3" fill="currentColor"/>
                <path d="M4.5 4.5L7 7M19.5 4.5L17 7M4.5 19.5L7 17M19.5 19.5L17 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="logo-text">Видение</span>
        </div>

        <div class="nav-menu">
            <a href="/profile" class="nav-link">👤 Личный кабинет</a>
        </div>
    </div>

    <h2>Распознавание математических выражений</h2>
    <p>Загрузите изображение с формулой (скриншот или photo), чтобы превратить её в текст.</p>

    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span>Кликните для выбора картинки или перетащите её сюда</span>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(this)">
        <img id="imagePreview" class="preview-img" alt="Превью">
    </div>

    <button id="submitBtn" onclick="uploadAndPredict()" disabled>Распознать формулу</button>

    <div id="resultBox" class="result-box">
        <h4>Результат распознавания:</h4>

        <div id="pdfArea" class="pdf-export-wrapper">
            <div id="mathRender"></div>
        </div>

        <h4>Код LaTeX (можно редактировать вручную):</h4>
        <textarea id="latexCode" class="latex-code" rows="3" oninput="updateMathPreview()"></textarea>

        <div class="action-buttons">
            <button onclick="copyToClipboard()" class="btn-secondary">📋 Скопировать код</button>
            <button onclick="downloadAsTexFile()" class="btn-success">💾 Скачать .tex</button>
            <button onclick="downloadAsPdfFile()" class="btn-pdf">📕 Скачать формулу как .pdf</button>
        </div>
    </div>
</div>

<script>
    let selectedFile = null;

    function handleFileSelect(input) {
        const file = input.files[0];
        if (file) {
            selectedFile = file;
            document.getElementById('submitBtn').disabled = false;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('imagePreview');
                img.src = e.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

    async function uploadAndPredict() {
        if (!selectedFile) return;

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = 'Обработка нейросетью...';
        submitBtn.disabled = true;

        const formData = new FormData();
        formData.append('file', selectedFile);

        try {
            const response = await fetch('/predict-math', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('latexCode').value = data.formula_latex;
                updateMathPreview();
            } else {
                alert('Ошибка: ' + (data.detail || 'Не удалось распознать'));
            }
        } catch (error) {
            alert('Произошла ошибка при отправке файла: ' + error);
        } finally {
            submitBtn.innerText = 'Распознать формулу';
            submitBtn.disabled = false;
        }
    }

    function updateMathPreview() {
        const currentFormula = document.getElementById('latexCode').value;
        const mathRenderDiv = document.getElementById('mathRender');

        if (mathRenderDiv) {
            katex.render(currentFormula, mathRenderDiv, {
                throwOnError: false,
                displayMode: true
            });
        }
    }

    async function copyToClipboard() {
        const latexText = document.getElementById('latexCode').value;
        try {
            await navigator.clipboard.writeText(latexText);
            alert('Код LaTeX успешно скопирован!');
        } catch (err) {
            alert('Не удалось скопировать код: ' + err);
        }
    }

    function downloadAsTexFile() {
        const latexText = document.getElementById('latexCode').value;
        if (!latexText) return;
        const blob = new Blob([latexText], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'formula.tex';
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function downloadAsPdfFile() {
        const formulaHtml = document.getElementById('mathRender').innerHTML;
        if (!formulaHtml) return;

        const printWindow = window.open('', '_blank', 'width=800,height=600');

        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <title>Экспорт формулы в PDF</title>
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
                <style>
                    body {
                        font-family: 'Segoe UI', sans-serif;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        height: 100vh;
                        margin: 0;
                        background: white;
                    }
                    .pdf-container {
                        font-size: 26px;
                        text-align: center;
                        padding: 40px;
                    }
                    @page {
                        size: auto;
                        margin: 0mm;
                    }
                </style>
            </head>
            <body>
                <div class="pdf-container">${formulaHtml}</div>
                <script>
                    window.onload = function() {
                        setTimeout(function() {
                            window.print();
                            window.close();
                        }, 250);
                    };
                <\/script>
            </body>
            </html>
        `);

        printWindow.document.close();
    }
</script>

</body>
</html>
